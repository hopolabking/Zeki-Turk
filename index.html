<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeki Türk V1.1 - Batuhan Edition</title>
    <style>
        :root { --main-color: #f68e1e; --bg-dark: #0a0a0a; --panel-dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); color: #fff; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Sol Panel */
        #sidebar { width: 280px; background: var(--panel-dark); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; transition: 0.3s; }
        .new-chat-btn { background: var(--main-color); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .new-chat-btn:hover { transform: scale(1.02); background: #e07d1a; }
        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .history-item { padding: 12px; background: #2a2a2a; border-radius: 8px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 4px solid transparent; transition: 0.2s; }
        .history-item.active { border-left-color: var(--main-color); background: #333; font-weight: bold; }

        /* Ana Alan */
        #main-content { flex: 1; display: flex; flex-direction: column; }
        #header { background: var(--panel-dark); padding: 15px 25px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #header h2 { margin: 0; font-size: 1.3rem; color: var(--main-color); letter-spacing: 1px; }
        
        #messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { padding: 14px 18px; border-radius: 15px; max-width: 80%; line-height: 1.6; animation: slideIn 0.3s ease; font-size: 1rem; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { background: var(--main-color); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 4px 15px rgba(246, 142, 30, 0.2); }
        .bot { background: #222; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 5px solid var(--main-color); color: #eee; }

        #input-area { padding: 25px; background: var(--panel-dark); border-top: 1px solid #333; display: flex; gap: 12px; }
        input { flex: 1; padding: 14px; border: none; border-radius: 12px; background: #2a2a2a; color: #fff; outline: none; font-size: 1rem; border: 1px solid transparent; }
        input:focus { border-color: var(--main-color); }
        button#sendBtn { background: var(--main-color); border: none; padding: 0 30px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button#sendBtn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div id="sidebar">
    <button class="new-chat-btn" onclick="createNewChat()">+ Yeni Sohbet Başlat</button>
    <div id="history-list"></div>
</div>

<div id="main-content">
    <div id="header">
        <h2>ZEKİ TÜRK V1.1</h2>
        <span id="chat-title" style="font-size: 0.85rem; opacity: 0.5;">Batuhan'ın Eseri</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Zeki Türk'e sor..." onkeypress="if(event.key==='Enter')send()">
        <button id="sendBtn" onclick="send()">GÖNDER</button>
    </div>
</div>

<script>
    const GROQ_API_KEY = "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";
    let currentChatId = null;
    let chats = JSON.parse(localStorage.getItem('zeki_turk_chats')) || [];

    // Robotun Doğum Hikayesi Mesajı
    const BIRTH_STORY = "Merhaba! Ben Zeki Türk. 26-27 Mart 2026 tarihlerinde Batuhan tarafından, Google'ın çıkardığı onca zorluğa ve 'not found' hatalarına karşı verilen büyük bir mücadele sonucunda kurulmaya başlandım. Kastamonu inadıyla aşamadığımız engel kalmadı; şimdi senin için buradayım! 🚀";

    window.onload = () => {
        renderHistory();
        if (chats.length > 0) {
            loadChat(chats[0].id);
        } else {
            createNewChat();
        }
    };

    function createNewChat() {
        currentChatId = Date.now();
        // Her yeni sohbete doğum hikayesini ekleyerek başlıyoruz
        const newChat = { 
            id: currentChatId, 
            title: "Yeni Sohbet", 
            messages: [{ text: BIRTH_STORY, sender: 'bot' }] 
        };
        chats.unshift(newChat);
        save();
        renderHistory();
        loadChat(currentChatId);
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        chats.forEach(chat => {
            const div = document.createElement('div');
            div.className = `history-item ${chat.id === currentChatId ? 'active' : ''}`;
            div.innerText = chat.title;
            div.onclick = () => loadChat(chat.id);
            list.appendChild(div);
        });
    }

    function loadChat(id) {
        currentChatId = id;
        const chat = chats.find(c => c.id === id);
        document.getElementById('chat-title').innerText = chat.title;
        const msgBox = document.getElementById('messages');
        msgBox.innerHTML = '';
        chat.messages.forEach(m => addMsgUI(m.text, m.sender));
        renderHistory();
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        const chat = chats.find(c => c.id === currentChatId);
        
        // İlk kullanıcı mesajında başlığı güncelle
        if (chat.messages.length === 1) { // 1 çünkü doğum hikayesi zaten içeride
            chat.title = text.substring(0, 25) + (text.length > 25 ? "..." : "");
        }

        addMsgUI(text, 'user');
        chat.messages.push({ text, sender: 'user' });
        input.value = "";
        save();

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "Senin adın Zeki Türk. Batuhan tarafından Mart 2026'da kurulun. Çok zeki, yardımsever ve hafif vakur bir tarzın var." },
                        ...chat.messages.map(m => ({ role: m.sender === 'user' ? 'user' : 'assistant', content: m.text }))
                    ]
                })
            });

            const data = await response.json();
            const botText = data.choices[0].message.content;
            
            addMsgUI(botText, 'bot');
            chat.messages.push({ text: botText, sender: 'bot' });
            save();
            renderHistory();
        } catch (e) {
            addMsgUI("Zeki Türk şu an dinleniyor, lütfen tekrar dene.", 'bot');
        }
    }

    function addMsgUI(text, sender) {
        const d = document.getElementById('messages');
        const m = document.createElement('div');
        m.className = 'msg ' + sender;
        m.innerText = text;
        d.appendChild(m);
        d.scrollTop = d.scrollHeight;
    }

    function save() {
        localStorage.setItem('zeki_turk_chats', JSON.stringify(chats));
    }
</script>

</body>
</html>
